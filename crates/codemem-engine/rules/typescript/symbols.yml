symbols:
  - kind: "function_declaration"
    symbol_kind: "function"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "class_declaration"
    symbol_kind: "class"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "interface_declaration"
    symbol_kind: "interface"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "type_alias_declaration"
    symbol_kind: "type"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "enum_declaration"
    symbol_kind: "enum"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "method_definition"
    symbol_kind: "method"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "public_field_definition"
    symbol_kind: "method"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: "ts_arrow_field"

  - kind: "public_field_definition"
    symbol_kind: "constant"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "lexical_declaration"
    symbol_kind: "function"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: "ts_lexical_arrow"

  - kind: "module"
    symbol_kind: "module"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "internal_module"
    symbol_kind: "module"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

scope_containers:
  - kind: "class_declaration"
    name_field: "name"
    body_field: "body"
    is_method_scope: true

  - kind: "module"
    name_field: "name"
    body_field: "body"
    is_method_scope: false

  - kind: "internal_module"
    name_field: "name"
    body_field: "body"
    is_method_scope: false

unwrap_nodes:
  - "export_statement"
