references:
  - kind: "import_statement"
    reference_kind: "import"
    name_field: "source"
    special: null

  - kind: "call_expression"
    reference_kind: "call"
    name_field: "function"
    special: null

  - kind: "class_declaration"
    reference_kind: "inherits"
    name_field: null
    special: "ts_class_heritage"

scope_containers:
  - kind: "class_declaration"
    name_field: "name"
    body_field: "body"

  - kind: "function_declaration"
    name_field: "name"
    body_field: "body"

  - kind: "method_definition"
    name_field: "name"
    body_field: "body"

  - kind: "module"
    name_field: "name"
    body_field: "body"

  - kind: "internal_module"
    name_field: "name"
    body_field: "body"

unwrap_nodes:
  - "export_statement"
