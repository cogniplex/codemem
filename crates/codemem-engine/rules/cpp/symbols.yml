symbols:
  - kind: "function_definition"
    symbol_kind: "function"
    name_field: "declarator"
    method_when_scoped: true
    is_scope: false
    special: null

  - kind: "class_specifier"
    symbol_kind: "class"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "struct_specifier"
    symbol_kind: "struct"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "enum_specifier"
    symbol_kind: "enum"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "namespace_definition"
    symbol_kind: "module"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "type_alias_declaration"
    symbol_kind: "type"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: "cpp_type_alias"

  - kind: "alias_declaration"
    symbol_kind: "type"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: "cpp_alias"

  - kind: "preproc_def"
    symbol_kind: "constant"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: "cpp_define"

scope_containers:
  - kind: "class_specifier"
    name_field: "name"
    body_field: "body"
    is_method_scope: true

  - kind: "struct_specifier"
    name_field: "name"
    body_field: "body"
    is_method_scope: true

  - kind: "namespace_definition"
    name_field: "name"
    body_field: "body"
    is_method_scope: false

unwrap_nodes: []
