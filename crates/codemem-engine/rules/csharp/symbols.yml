symbols:
  - kind: "namespace_declaration"
    symbol_kind: "module"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "class_declaration"
    symbol_kind: "class"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "interface_declaration"
    symbol_kind: "interface"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "enum_declaration"
    symbol_kind: "enum"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "struct_declaration"
    symbol_kind: "struct"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "method_declaration"
    symbol_kind: "method"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "constructor_declaration"
    symbol_kind: "method"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "property_declaration"
    symbol_kind: "method"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "field_declaration"
    symbol_kind: "constant"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: "csharp_field"

scope_containers:
  - kind: "namespace_declaration"
    name_field: "name"
    body_field: "body"
    is_method_scope: false

  - kind: "class_declaration"
    name_field: "name"
    body_field: "body"
    is_method_scope: true

  - kind: "interface_declaration"
    name_field: "name"
    body_field: "body"
    is_method_scope: true

  - kind: "struct_declaration"
    name_field: "name"
    body_field: "body"
    is_method_scope: true

unwrap_nodes: []
