symbols:
  - kind: "class"
    symbol_kind: "class"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "module"
    symbol_kind: "module"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "method"
    symbol_kind: "method"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "singleton_method"
    symbol_kind: "method"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "assignment"
    symbol_kind: "constant"
    name_field: "left"
    method_when_scoped: false
    is_scope: false
    special: "ruby_constant_assignment"

scope_containers:
  - kind: "class"
    name_field: "name"
    body_field: "body"
    is_method_scope: true

  - kind: "module"
    name_field: "name"
    body_field: "body"
    is_method_scope: true

unwrap_nodes: []
