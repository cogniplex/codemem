references:
  - kind: "call"
    reference_kind: "import"
    name_field: null
    special: "ruby_require"

  - kind: "call"
    reference_kind: "call"
    name_field: "method"
    special: "ruby_call"

  - kind: "class"
    reference_kind: "inherits"
    name_field: null
    special: "ruby_superclass"

  - kind: "call"
    reference_kind: "import"
    name_field: null
    special: "ruby_include_extend"

scope_containers:
  - kind: "class"
    name_field: "name"
    body_field: "body"

  - kind: "module"
    name_field: "name"
    body_field: "body"

  - kind: "method"
    name_field: "name"
    body_field: "body"

  - kind: "singleton_method"
    name_field: "name"
    body_field: "body"

unwrap_nodes: []
