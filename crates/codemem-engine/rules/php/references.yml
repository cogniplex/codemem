references:
  - kind: "namespace_use_declaration"
    reference_kind: "import"
    name_field: null
    special: "php_use"

  - kind: "function_call_expression"
    reference_kind: "call"
    name_field: "function"
    special: null

  - kind: "base_clause"
    reference_kind: "inherits"
    name_field: null
    special: "php_base_clause"

  - kind: "class_interface_clause"
    reference_kind: "implements"
    name_field: null
    special: "php_implements"

  - kind: "use_declaration"
    reference_kind: "import"
    name_field: null
    special: "php_trait_use"

scope_containers:
  - kind: "namespace_definition"
    name_field: "name"
    body_field: "body"

  - kind: "class_declaration"
    name_field: "name"
    body_field: "body"

  - kind: "interface_declaration"
    name_field: "name"
    body_field: "body"

  - kind: "trait_declaration"
    name_field: "name"
    body_field: "body"

  - kind: "method_declaration"
    name_field: "name"
    body_field: "body"

unwrap_nodes: []
