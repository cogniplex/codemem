symbols:
  - kind: "function_definition"
    symbol_kind: "function"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "class_declaration"
    symbol_kind: "class"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "method_declaration"
    symbol_kind: "method"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: null

  - kind: "namespace_definition"
    symbol_kind: "module"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "interface_declaration"
    symbol_kind: "interface"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

  - kind: "property_declaration"
    symbol_kind: "constant"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: "php_property"

  - kind: "const_declaration"
    symbol_kind: "constant"
    name_field: "name"
    method_when_scoped: false
    is_scope: false
    special: "php_const"

  - kind: "trait_declaration"
    symbol_kind: "interface"
    name_field: "name"
    method_when_scoped: false
    is_scope: true
    special: null

scope_containers:
  - kind: "namespace_definition"
    name_field: "name"
    body_field: "body"
    is_method_scope: false

  - kind: "class_declaration"
    name_field: "name"
    body_field: "body"
    is_method_scope: true

  - kind: "interface_declaration"
    name_field: "name"
    body_field: "body"
    is_method_scope: true

  - kind: "trait_declaration"
    name_field: "name"
    body_field: "body"
    is_method_scope: true

unwrap_nodes: []
