references:
  - kind: "import_declaration"
    reference_kind: "import"
    name_field: null
    special: "swift_import"

  - kind: "call_expression"
    reference_kind: "call"
    name_field: "function"
    special: null

  - kind: "type_inheritance_clause"
    reference_kind: "inherits"
    name_field: null
    special: "swift_inheritance"

  - kind: "inheritance_clause"
    reference_kind: "inherits"
    name_field: null
    special: "swift_inheritance"

scope_containers:
  - kind: "class_declaration"
    name_field: "name"
    body_field: "body"
    special: "swift_scope"

  - kind: "protocol_declaration"
    name_field: "name"
    body_field: "body"

  - kind: "function_declaration"
    name_field: "name"
    body_field: "body"

unwrap_nodes: []
