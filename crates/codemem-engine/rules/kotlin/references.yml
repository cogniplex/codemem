references:
  - kind: "import_header"
    reference_kind: "import"
    name_field: null
    special: "kotlin_import"

  - kind: "call_expression"
    reference_kind: "call"
    name_field: "function"
    special: "kotlin_call"

  - kind: "delegation_specifier"
    reference_kind: "inherits"
    name_field: null
    special: "kotlin_delegation"

scope_containers:
  - kind: "class_declaration"
    name_field: "name"
    body_field: "body"

  - kind: "object_declaration"
    name_field: "name"
    body_field: "body"

  - kind: "function_declaration"
    name_field: "name"
    body_field: "body"

unwrap_nodes: []
