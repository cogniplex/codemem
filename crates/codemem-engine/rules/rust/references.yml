references:
  - kind: "use_declaration"
    reference_kind: "import"
    name_field: null
    special: "rust_use"

  - kind: "call_expression"
    reference_kind: "call"
    name_field: "function"
    special: null

  - kind: "macro_invocation"
    reference_kind: "call"
    name_field: "macro"
    special: "rust_macro"

  - kind: "impl_item"
    reference_kind: "implements"
    name_field: null
    special: "rust_impl_trait"

scope_containers:
  - kind: "impl_item"
    name_field: "type"
    body_field: "body"

  - kind: "function_item"
    name_field: "name"
    body_field: "body"

  - kind: "mod_item"
    name_field: "name"
    body_field: "body"

  - kind: "trait_item"
    name_field: "name"
    body_field: "body"

unwrap_nodes: []
